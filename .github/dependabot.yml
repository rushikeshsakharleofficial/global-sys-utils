    directory: /
    schedule:
      interval: daily
      time: "08:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
      time: "08:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "08:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
