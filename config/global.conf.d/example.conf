# Example per-application rotation job
# Place files like this in /etc/global-sys-utils/global.conf.d/
# Naming convention: 10-nginx.conf, 20-apps.conf (alphabetical = load order)
#
# In daemon mode each conf.d file is an INDEPENDENT rotation job.
# Settings here override global.conf defaults for this job only.
#
# Run daemon: global-logrotate --daemon
# Run once:   global-logrotate --daemon-once

# --- Rotation ---
# LOG_DIR = /var/log/nginx
# PATTERN = *.log
# PARALLEL_JOBS = 2
# OLD_LOGS_DIR = /var/log/nginx/archived

# --- Schedule (required for daemon mode) ---
# SCHEDULE = 0 2 * * *       # daily at 2 AM
# SCHEDULE = @daily           # same thing
# SCHEDULE = 6h               # every 6 hours
# SCHEDULE = 0 */4 * * *     # every 4 hours

# --- Disk safety overrides ---
# DISK_CRITICAL_PERCENT = 85
# DISK_MIN_FREE_MB = 500

# --- Cloud backup for this job (optional) ---
# CLOUD_PROVIDER = aws
# CLOUD_DESTINATION = s3://my-bucket/nginx-logs
# CLOUD_DAYS = 1
# CLOUD_PARALLEL = 2
# CLOUD_AWS_REGION = us-east-1
# CLOUD_BACKUP_ON_SCHEDULE = true    # backup after every rotation
# CLOUD_BACKUP_ON_PANIC = true       # backup immediately when disk critical

# GCP example:
# CLOUD_PROVIDER = gcp
# CLOUD_DESTINATION = gs://my-bucket/nginx-logs
# CLOUD_GCP_PROJECT = my-gcp-project
# CLOUD_GCP_CREDENTIALS = /etc/global-sys-utils/service-account.json
# CLOUD_BACKUP_ON_PANIC = true
