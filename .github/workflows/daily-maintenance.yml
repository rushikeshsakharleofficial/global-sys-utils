name: Daily Maintenance

on:
  schedule:
    # 03:00 UTC = 08:30 Asia/Kolkata
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Install package tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y rpm dpkg

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Go tests
        run: go test ./cmd/global-logrotate/ -race -count=1 -v

      - name: Python tests
        run: python -m pytest tests -v

      - name: Build packages
        run: make packages-all

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check docs files exist
        run: |
          test -f README.md
          test -f man/global-logrotate.1
          test -f Makefile
          test -f packaging/deb/control
          test -f packaging/rpm/global-logrotate.spec

      - name: Check version consistency
        run: |
          version=$(awk '/^VERSION :=/{print $3}' Makefile)
          grep -q "$version" README.md
          grep -q "$version" man/global-logrotate.1
