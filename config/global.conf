# Global Log Rotate Configuration
# /etc/global-sys-utils/global.conf
#
# Main configuration file for global-logrotate.
# Drop-in files: /etc/global-sys-utils/global.conf.d/*.conf
# Each conf.d file is treated as an independent rotation job in daemon mode.
# Files load in alphabetical order; later values override earlier ones.
# Command-line arguments override all config file values.

# ============================================================
# ROTATION SETTINGS
# ============================================================

# Default log directory to search
# LOG_DIR = /var/log/apps

# File pattern to match (glob syntax)
# PATTERN = *.log

# Date format: "date" (YYYYMMDD) or "full" (YYYYMMDDTHH:MM:SS)
# DATE_FORMAT = date

# Custom backup directory for rotated logs (default: <logdir>/old_logs)
# OLD_LOGS_DIR =

# Path to file containing exclude patterns (one glob per line)
# EXCLUDE_FILE =

# Number of parallel jobs (default: 4)
# PARALLEL_JOBS = 4

# Enable dry-run mode by default
# DRY_RUN = false

# ============================================================
# ENCRYPTION SETTINGS
# ============================================================

# Enable AES-256-GCM encryption for rotated logs
# ENCRYPT = false

# SHA-256 hash of encryption password (recommended over plain text)
# Generate: echo -n 'yourpassword' | sha256sum | cut -d' ' -f1
# ENCRYPT_PASSWORD_HASH =

# Plain text password (NOT recommended — use hash above)
# ENCRYPT_PASSWORD =

# Password via environment variable: export LOGROTATE_PASSWORD="yourpassword"

# ============================================================
# DAEMON / SCHEDULING
# ============================================================
# Run daemon with: global-logrotate --daemon
# Run once (for systemd timers): global-logrotate --daemon-once
#
# Schedule format:
#   Cron:     "0 2 * * *"   (min hour dom month dow)
#   Interval: "6h" "30m" "7d"
#   Alias:    @daily  @hourly  @weekly  @monthly
#
# SCHEDULE = 0 2 * * *

# PID file path (written when daemon starts)
# PID_FILE = /run/global-logrotate.pid

# ============================================================
# DISK SAFETY
# ============================================================

# Trigger an immediate emergency rotation when disk usage reaches this %
# The daemon checks disk every DISK_CHECK_INTERVAL seconds.
# DISK_CRITICAL_PERCENT = 90

# Refuse to write a compressed archive if free space would drop below this MB.
# The source file is NOT truncated in this case — data is preserved.
# DISK_MIN_FREE_MB = 200

# How often (seconds) the daemon checks disk usage
# DISK_CHECK_INTERVAL = 60

# ============================================================
# CLOUD BACKUP INTEGRATION (daemon mode)
# ============================================================
# When set, the daemon calls global-aws-backup or global-gcp-backup
# after each rotation. Manual use of those tools is unaffected.
#
# Cloud provider: aws | gcp | (empty = disabled)
# CLOUD_PROVIDER =
#
# Source directory to back up (defaults to OLD_LOGS_DIR or <logdir>/old_logs)
# CLOUD_SOURCE =
#
# Destination bucket URL
#   AWS: s3://my-bucket/prefix
#   GCP: gs://my-bucket/prefix
# CLOUD_DESTINATION =
#
# Only back up files older than N days
# CLOUD_DAYS = 1
#
# Concurrent uploads
# CLOUD_PARALLEL = 4
#
# Per-operation timeout in seconds
# CLOUD_TIMEOUT = 300
#
# AWS-specific
# CLOUD_AWS_PROFILE =
# CLOUD_AWS_REGION =
#
# GCP-specific
# CLOUD_GCP_PROJECT =
# CLOUD_GCP_CREDENTIALS = /etc/service-account.json
#
# Run cloud backup after every scheduled rotation
# CLOUD_BACKUP_ON_SCHEDULE = false
#
# Run cloud backup when disk reaches DISK_CRITICAL_PERCENT (panic mode)
# This ships logs off-disk immediately to reclaim space.
# CLOUD_BACKUP_ON_PANIC = false

# ============================================================
# LOGGING SETTINGS
# ============================================================

# LOG_FILE = /var/log/global-sys-utils/global-logrotate.log

# Log level: error | info | debug
# LOG_LEVEL = info
